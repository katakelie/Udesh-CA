<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In – CAFinalPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26; --border: #2a2a3d;
    --accent: #f97316; --text: #f1f1f8; --muted: #8888aa;
    --gradient: linear-gradient(135deg, #f97316, #ef4444);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .bg-decor {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(249,115,22,0.08), transparent 70%);
  }
  .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }
  .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; text-align: center; margin-bottom: 2rem; text-decoration: none; color: var(--text); display: block; }
  .auth-logo span { color: var(--accent); }
  .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }
  .auth-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
  .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.75rem; }
  .auth-sub a { color: var(--accent); text-decoration: none; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 0.75rem 1rem; border-radius: 10px;
    font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); }
  input::placeholder { color: rgba(136,136,170,0.4); }
  .forgot { text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
  .forgot a { font-size: 0.8rem; color: var(--accent); text-decoration: none; }
  .btn-submit {
    width: 100%; background: var(--gradient); color: white; border: none;
    padding: 0.85rem; border-radius: 10px; font-size: 1rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; margin-top: 0.25rem;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 0.78rem; color: var(--muted); }
  .btn-google {
    width: 100%; background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 0.75rem; border-radius: 10px; font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
  }
  .btn-google:hover { border-color: rgba(249,115,22,0.4); }
  .alert { padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="bg-decor"></div>
<div class="auth-wrap">
  <a href="index.html" class="auth-logo">CA<span>Final</span>Pro</a>
  <div class="auth-card">
    <div class="auth-title">Welcome Back 👋</div>
    <div class="auth-sub">New here? <a href="signup.html">Create a free account</a></div>

    <div id="alertBox"></div>

    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or log in with email</span></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="rahul@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

   // ⚠️ REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
  apiKey: "AIzaSyC_gIoQkRezRh2TI87BsgI8Dy9fFtI3YZU",
  authDomain: "udesh-ca.firebaseapp.com",
  projectId: "udesh-ca",
  storageBucket: "udesh-ca.firebasestorage.app",
  messagingSenderId: "631429402013",
  appId: "1:631429402013:web:9cc3dda0941a2405523374"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  function showAlert(msg, type='error') {
    document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Logging in...' : 'Log In';
  }

  window.handleLogin = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showAlert('Please fill in all fields.');
    setLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch(err) {
      const messages = {
        'auth/user-not-found': 'No account found. <a href="signup.html">Sign up</a>.',
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/invalid-email': 'Please enter a valid email.',
        'auth/too-many-requests': 'Too many attempts. Please wait a moment.'
      };
      showAlert(messages[err.code] || 'Login failed. Please try again.');
    }
    setLoading(false);
  };

  window.signInWithGoogle = async () => {
    try {
      await signInWithPopup(auth, provider);
      window.location.href = 'dashboard.html';
    } catch(err) {
      showAlert('Google sign-in failed. Please try again.');
    }
  };

  // Press Enter to login
  document.addEventListener('keydown', e => { if(e.key === 'Enter') window.handleLogin(); });
</script>
</body>
</html>
